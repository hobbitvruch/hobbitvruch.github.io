<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fridge to Fork</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Slab:wght@600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --orange: #D4540A;
    --burgundy: #7B1F2E;
    --orange-light: #FFF0E8;
    --burg-light: #F9EEF0;
    --green: #2D7A3A;
    --green-hover: #1f5a29;
    --text: #1a1a18;
    --text-sec: #555550;
    --text-ter: #888882;
    --border: rgba(0,0,0,0.13);
    --border-med: rgba(0,0,0,0.22);
    --bg-sec: #f7f7f5;
    --success: #2d9e6b;
    --danger: #C0392B;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  body {
    font-family: 'Roboto', sans-serif;
    background: #fff;
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 3rem;
  }
  .header { padding: 2rem 1.25rem 1.25rem; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
  .logo { font-family: 'Roboto Slab', serif; font-size: 28px; font-weight: 700; color: var(--orange); letter-spacing: -0.5px; }
  .logo-dot { color: var(--burgundy); }
  .subtitle { font-size: 14px; color: var(--text-sec); margin-top: 5px; }
  .section { padding: 0 1.25rem; margin-bottom: 1.5rem; }
  .section-label { font-size: 11px; font-weight: 700; color: var(--burgundy); text-transform: uppercase; letter-spacing: 0.09em; margin-bottom: 10px; }
  .tag-input-row { display: flex; gap: 8px; }
  .tag-input-row input {
    flex: 1; padding: 12px 14px; border: 1px solid var(--border-med);
    border-radius: var(--radius-md); font-size: 16px; font-family: 'Roboto', sans-serif;
    background: #fff; color: var(--text); outline: none;
  }
  .tag-input-row input:focus { border-color: var(--orange); }
  .tag-input-row input::placeholder { color: var(--text-ter); }
  .add-btn {
    padding: 12px 16px; border: 1px solid var(--orange); border-radius: var(--radius-md);
    background: var(--orange); color: #fff; font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s, background 0.15s;
  }
  .add-btn:hover { background: var(--burgundy); border-color: var(--burgundy); }
  .add-btn:active { transform: scale(0.94); }
  .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; min-height: 16px; }
  .tag {
    display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px;
    background: var(--orange-light); border: 1px solid rgba(212,84,10,0.2);
    border-radius: 999px; font-size: 13px; color: var(--burgundy); font-weight: 500;
  }
  .tag-remove { cursor: pointer; color: var(--orange); font-size: 17px; line-height: 1; }
  .basics { display: flex; flex-wrap: wrap; gap: 6px; }
  .basic-pill {
    font-size: 13px; padding: 5px 12px; background: var(--bg-sec);
    border-radius: 999px; color: var(--text); border: 1px solid var(--border-med);
    cursor: pointer; transition: all 0.15s; user-select: none; font-weight: 500;
  }
  .basic-pill:hover { border-color: #aaa; }
  .basic-pill.excluded {
    background: #fff0f0; border-color: #C0392B;
    color: #C0392B; font-weight: 600; text-decoration: line-through;
  }
  .basics-hint { font-size: 11px; color: var(--text-ter); margin-top: 7px; }
  .pref-row { display: flex; gap: 8px; }
  .pref-btn {
    flex: 1; padding: 10px 4px; border: 1.5px solid var(--border-med);
    border-radius: var(--radius-md); background: #fff; color: var(--text);
    font-size: 13px; font-weight: 500; cursor: pointer; text-align: center;
    font-family: 'Roboto', sans-serif; transition: all 0.15s;
  }
  .pref-btn:hover { border-color: #888; }
  .pref-btn.active { border-color: var(--orange); color: #fff; background: var(--orange); font-weight: 700; }
  .find-btn {
    width: 100%; padding: 15px; border: none; border-radius: var(--radius-lg);
    background: var(--green); color: #fff; font-size: 16px; font-weight: 700;
    cursor: pointer; font-family: 'Roboto', sans-serif;
    transition: transform 0.1s, background 0.15s;
  }
  .find-btn:hover { background: var(--green-hover); }
  .find-btn:active { transform: scale(0.98); }
  .find-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
  .loading { text-align: center; padding: 4rem 1.25rem; }
  .spinner {
    width: 36px; height: 36px; border: 2.5px solid var(--orange-light);
    border-top-color: var(--orange); border-radius: 50%;
    animation: spin 0.75s linear infinite; margin: 0 auto 1.25rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 15px; color: var(--text-sec); }
  .results { padding: 0 1.25rem; }
  .recipe-img {
    width: 100%; height: 220px; object-fit: cover;
    border-radius: var(--radius-lg); margin-bottom: 1.25rem;
    border: 1px solid var(--border); display: block;
  }
  .recipe-card {
    background: #fff; border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1rem;
  }
  .recipe-name { font-family: 'Roboto Slab', serif; font-size: 22px; font-weight: 700; color: var(--burgundy); letter-spacing: -0.3px; margin-bottom: 6px; }
  .recipe-desc { font-size: 14px; color: var(--text-sec); line-height: 1.55; margin-bottom: 1.25rem; }
  .time-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.25rem; }
  .time-chip {
    display: flex; align-items: center; gap: 5px; font-size: 13px;
    padding: 6px 12px; border: 1px solid var(--border);
    border-radius: 999px; color: var(--text-sec); background: var(--bg-sec);
  }
  .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }
  .macros-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-bottom: 1.25rem; }
  .macro-card { background: var(--bg-sec); border-radius: var(--radius-md); padding: 12px 14px; border: 1px solid var(--border); }
  .macro-full { grid-column: 1 / -1; }
  .macro-label { font-size: 11px; color: var(--burgundy); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; font-weight: 700; }
  .macro-value { font-size: 20px; font-weight: 700; color: var(--orange); }
  .macro-unit { font-size: 12px; font-weight: 400; color: var(--text-sec); }
  .need-to-buy { background: var(--burg-light); border-radius: var(--radius-md); padding: 12px 14px; margin-bottom: 1.25rem; border: 1px solid rgba(123,31,46,0.15); }
  .need-title { font-size: 11px; font-weight: 700; color: var(--burgundy); margin-bottom: 7px; display: flex; align-items: center; gap: 5px; text-transform: uppercase; letter-spacing: 0.06em; }
  .need-item { font-size: 14px; color: var(--burgundy); padding: 2px 0; opacity: 0.85; }
  .ing-title { font-size: 11px; font-weight: 700; color: var(--burgundy); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
  .ing-list { list-style: none; }
  .ing-list li { font-size: 14px; padding: 7px 0; border-bottom: 1px solid var(--border); color: var(--text-sec); display: flex; align-items: center; gap: 8px; }
  .ing-list li:last-child { border-bottom: none; }
  .ing-have { color: var(--success); }
  .ing-need { color: var(--danger); }
  .steps-title { font-size: 11px; font-weight: 700; color: var(--burgundy); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
  .step { display: flex; gap: 14px; margin-bottom: 14px; }
  .step-num { width: 26px; height: 26px; border-radius: 50%; background: var(--orange); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 1px; color: #fff; }
  .step-text { font-size: 14px; line-height: 1.6; color: var(--text-sec); }
  .action-btns { padding: 0 1.25rem; display: flex; flex-direction: column; gap: 8px; }
  .secondary-btn { width: 100%; padding: 13px; border: 1px solid var(--border-med); border-radius: var(--radius-lg); background: #fff; color: var(--burgundy); font-size: 15px; cursor: pointer; font-family: 'Roboto', sans-serif; font-weight: 500; transition: background 0.15s; }
  .secondary-btn:hover { background: var(--burg-light); }
  .secondary-btn:active { transform: scale(0.98); }
  .error-msg { padding: 2rem 1.25rem; text-align: center; color: var(--danger); font-size: 15px; }
  #view-input { display: block; }
  #view-loading { display: none; }
  #view-results { display: none; }
</style>
</head>
<body>

<div id="view-input">
  <div class="header">
    <div class="logo">Fridge to Fork<span class="logo-dot"> ·</span></div>
    <div class="subtitle">Tell me what you have — I'll find your dinner.</div>
  </div>

  <div class="section">
    <div class="section-label">Your ingredients</div>
    <div class="tag-input-row">
      <input id="ing-input" type="text" placeholder="e.g. chicken, rice, tomatoes…" autocomplete="off"/>
      <button class="add-btn" onclick="addIngredient()" aria-label="Add ingredient">
        <i class="ti ti-plus"></i>
      </button>
    </div>
    <div class="tags" id="tags-container"></div>
  </div>

  <div class="section">
    <div class="section-label">Basics always assumed</div>
    <div class="basics" id="basics-container"></div>
    <div class="basics-hint">Tap any item to mark it as out of stock — it turns red and will be excluded.</div>
  </div>

  <div class="section">
    <div class="section-label">Dietary preference</div>
    <div class="pref-row">
      <button class="pref-btn active" data-pref="any" onclick="setPref(this)">Any</button>
      <button class="pref-btn" data-pref="vegetarian" onclick="setPref(this)">Veggie</button>
      <button class="pref-btn" data-pref="vegan" onclick="setPref(this)">Vegan</button>
      <button class="pref-btn" data-pref="low-carb" onclick="setPref(this)">Low-carb</button>
    </div>
  </div>

  <div class="section">
    <button class="find-btn" id="find-btn" onclick="findRecipe()">Find my dinner →</button>
  </div>
</div>

<div id="view-loading">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">Raiding the fridge…</div>
  </div>
</div>

<div id="view-results">
  <div class="results" id="results-content"></div>
  <div class="action-btns">
    <button class="secondary-btn" onclick="findRecipe()">Give me another recipe →</button>
    <button class="secondary-btn" onclick="goBack()">← Change ingredients</button>
  </div>
</div>

<script>
  let ingredients = [];
  let dietPref = 'any';
  let previousRecipes = [];

  const allBasics = ['olive oil','salt & pepper','butter','garlic','onion','sugar','flour','vinegar','dried herbs'];
  let excludedBasics = new Set();

  function renderBasics() {
    const c = document.getElementById('basics-container');
    c.innerHTML = allBasics.map(b => {
      const exc = excludedBasics.has(b);
      return `<span class="basic-pill${exc ? ' excluded' : ''}" onclick="toggleBasic('${b}')">${exc ? '✕ ' : ''}${b}</span>`;
    }).join('');
  }
  renderBasics();

  function toggleBasic(name) {
    if (excludedBasics.has(name)) excludedBasics.delete(name);
    else excludedBasics.add(name);
    renderBasics();
  }

  function addIngredient() {
    const input = document.getElementById('ing-input');
    const val = input.value.trim().toLowerCase();
    if (!val) return;
    val.split(',').map(s => s.trim()).filter(Boolean).forEach(p => {
      if (p && !ingredients.includes(p)) ingredients.push(p);
    });
    input.value = '';
    renderTags();
    input.focus();
  }

  document.getElementById('ing-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addIngredient();
  });

  function renderTags() {
    document.getElementById('tags-container').innerHTML = ingredients.map((ing, i) =>
      `<span class="tag">${ing}<span class="tag-remove" onclick="removeIng(${i})">×</span></span>`
    ).join('');
  }

  function removeIng(i) { ingredients.splice(i, 1); renderTags(); }

  function setPref(btn) {
    document.querySelectorAll('.pref-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    dietPref = btn.dataset.pref;
  }

  function show(viewId) {
    ['view-input', 'view-loading', 'view-results'].forEach(id => {
      document.getElementById(id).style.display = id === viewId ? 'block' : 'none';
    });
  }

  function goBack() { show('view-input'); }

  const loadingMessages = ['Raiding the fridge…','Checking what pairs well…','Calculating your macros…','Plating up your recipe…','Consulting the chef…'];
  let loadingInterval;

  function startLoadingAnim() {
    let i = 0;
    const el = document.getElementById('loading-text');
    el.textContent = loadingMessages[0];
    loadingInterval = setInterval(() => {
      i = (i + 1) % loadingMessages.length;
      el.textContent = loadingMessages[i];
    }, 2000);
  }

  function stopLoadingAnim() { clearInterval(loadingInterval); }

  async function findRecipe() {
    if (ingredients.length === 0) { alert('Please add at least one ingredient.'); return; }
    show('view-loading');
    startLoadingAnim();

    const availableBasics = allBasics.filter(b => !excludedBasics.has(b));
    const dietNote = dietPref === 'any' ? '' : `Diet requirement: ${dietPref}.`;
    const exclude = previousRecipes.length > 0 ? `Do NOT suggest any of these: ${previousRecipes.join(', ')}.` : '';

    const prompt = `You are a helpful recipe assistant. The user has these ingredients: ${ingredients.join(', ')}.
They also have these pantry basics available: ${availableBasics.join(', ')}.
${dietNote}
Suggest ONE great dinner recipe. Prefer recipes using only what they have, but you may suggest up to 2 extra items to buy if they significantly improve the dish.
${exclude}
Respond ONLY with a valid JSON object — no markdown, no explanation, no backticks:
{
  "name": "Recipe Name",
  "description": "1-2 sentence enticing description",
  "imageQuery": "plated food photography keyword",
  "prepTime": 10,
  "cookTime": 20,
  "totalTime": 30,
  "servings": 2,
  "nutrition": {"calories": 520,"protein": 38,"carbs": 45,"fat": 18,"fiber": 6},
  "ingredients": [{"name": "chicken breast","amount": "300g","have": true},{"name": "lemon","amount": "1","have": false}],
  "steps": ["Step one.","Step two."]
}
imageQuery: 4-6 word Unsplash food photo search for the dish. Nutrition per serving. Times in minutes. Mark have:true if user has it (from their ingredient list or available basics), have:false if they need to buy it.`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      const data = await response.json();
      stopLoadingAnim();
      const rawText = data.content.map(b => b.text || '').join('').trim().replace(/```json|```/g, '').trim();
      const recipe = JSON.parse(rawText);
      previousRecipes.push(recipe.name);
      renderRecipe(recipe);
      show('view-results');
      window.scrollTo(0, 0);
    } catch (err) {
      stopLoadingAnim();
      document.getElementById('results-content').innerHTML = `<div class="error-msg">Something went wrong — please try again.</div>`;
      show('view-results');
      console.error(err);
    }
  }

  function renderRecipe(r) {
    const haveIngs = r.ingredients.filter(i => i.have);
    const needIngs = r.ingredients.filter(i => !i.have);
    const query = encodeURIComponent(r.imageQuery || r.name + ' food');
    const imgHtml = `<img class="recipe-img" src="https://source.unsplash.com/800x400/?${query}" alt="${r.name}" onerror="this.style.display='none'"/>`;
    const needHtml = needIngs.length > 0 ? `
      <div class="need-to-buy">
        <div class="need-title"><i class="ti ti-shopping-cart"></i> Need to buy (${needIngs.length})</div>
        ${needIngs.map(i => `<div class="need-item">· ${i.amount} ${i.name}</div>`).join('')}
      </div>` : '';
    const ingListHtml = [
      ...haveIngs.map(i => `<li><i class="ti ti-check ing-have" style="font-size:14px"></i>${i.amount} ${i.name}</li>`),
      ...needIngs.map(i => `<li><i class="ti ti-shopping-cart ing-need" style="font-size:14px"></i>${i.amount} ${i.name} <span style="font-size:12px;color:var(--danger)">(buy)</span></li>`)
    ].join('');
    const stepsHtml = r.steps.map((s, i) => `
      <div class="step">
        <div class="step-num">${i + 1}</div>
        <div class="step-text">${s}</div>
      </div>`).join('');

    document.getElementById('results-content').innerHTML = `
      ${imgHtml}
      <div class="recipe-card">
        <div class="recipe-name">${r.name}</div>
        <div class="recipe-desc">${r.description}</div>
        <div class="time-row">
          <div class="time-chip"><i class="ti ti-clock" style="font-size:14px"></i> Prep ${r.prepTime}m</div>
          <div class="time-chip"><i class="ti ti-flame" style="font-size:14px"></i> Cook ${r.cookTime}m</div>
          <div class="time-chip"><i class="ti ti-clock-check" style="font-size:14px"></i> Total ${r.totalTime}m</div>
          <div class="time-chip"><i class="ti ti-users" style="font-size:14px"></i> Serves ${r.servings}</div>
        </div>
        <div class="divider"></div>
        <div class="section-label" style="margin-bottom:10px">Nutrition per serving</div>
        <div class="macros-grid">
          <div class="macro-card"><div class="macro-label">Calories</div><div class="macro-value">${r.nutrition.calories}<span class="macro-unit"> kcal</span></div></div>
          <div class="macro-card"><div class="macro-label">Protein</div><div class="macro-value">${r.nutrition.protein}<span class="macro-unit"> g</span></div></div>
          <div class="macro-card"><div class="macro-label">Carbs</div><div class="macro-value">${r.nutrition.carbs}<span class="macro-unit"> g</span></div></div>
          <div class="macro-card"><div class="macro-label">Fat</div><div class="macro-value">${r.nutrition.fat}<span class="macro-unit"> g</span></div></div>
          <div class="macro-card macro-full"><div class="macro-label">Fibre</div><div class="macro-value">${r.nutrition.fiber}<span class="macro-unit"> g</span></div></div>
        </div>
        <div class="divider"></div>
        ${needHtml}
        <div class="ing-title">Ingredients</div>
        <ul class="ing-list">${ingListHtml}</ul>
        <div class="divider"></div>
        <div class="steps-title">Method</div>
        ${stepsHtml}
      </div>`;
  }
</script>
</body>
</html>
